<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <!-- Stylish Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    .cover h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      margin: 0;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
    }

    .cover p {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 3px;
    }

    /* INVITATION */
    .invitation {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: scale(0.8);
      transition: all 1s ease;
      background: #f4f4f4;
    }

    .invitation.show {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    /* CARD */
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .card h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 36px;
      color: #b76e79;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 30px;
      margin: 20px 0;
    }

    .details {
      font-size: 18px;
      margin: 10px 0;
    }
  </style>

</head>
<body>

<!-- COVER -->
<div class="cover" id="cover" onclick="openInvite()">
  <h1>Wedding Invitation</h1>
  <p>Click to Open</p>
</div>

<!-- INVITATION -->
<div class="invitation" id="invite">
  <div class="card">
    <h2>Wedding Invitation</h2>
    <p>Together with their families</p>

    <div class="names">
      Anas ❤️ [Bride Name]
    </div>

    <p class="details">Date: 10 July 2026</p>
    <p class="details">Time: 6:00 PM</p>
    <p class="details">Venue: Your Wedding Hall</p>
  </div>
</div>

<script>
  function openInvite() {
    let cover = document.getElementById("cover");
    let invite = document.getElementById("invite");

    cover.style.opacity = "0";

    setTimeout(() => {
      cover.style.display = "none";
      invite.style.display = "flex";

      setTimeout(() => {
        invite.classList.add("show");
      }, 50);

    }, 1000);
  }
</script>

</body>
</html>
