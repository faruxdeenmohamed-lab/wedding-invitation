<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&family=Amiri&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    .bismillah {
      font-family: 'Amiri', serif;
      font-size: clamp(50px, 7vw, 90px);
      direction: rtl;
      margin-bottom: 25px;
      color: #000;
    }

    .cover h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(80px, 12vw, 150px);
      margin: 0;
    }

    .invite-line {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 4vw, 50px);
      margin-top: 25px;
      color: #000;
    }

    .click-open {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 3vw, 40px);
      margin-top: 35px;
      opacity: 0.8;
    }

    /* INVITATION BACKGROUND */
    .invitation {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;

      background: url('images/inside.jpg') no-repeat center center;
      background-size: cover;

      position: relative;

      opacity: 0;
      transform: scale(0.8);
      transition: all 1s ease;
    }

    /* DARK OVERLAY FOR LUXURY LOOK */
    .invitation::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .invitation.show {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    /* GLASS CARD */
    .card {
      position: relative;
      z-index: 2;

      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      padding: 45px;
      border-radius: 22px;
      text-align: center;

      max-width: 650px;
      width: 90%;

      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    /* soft shine effect */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.05)
      );
      pointer-events: none;
    }

    .card h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
      color: #b76e79;
      margin: 0;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 45px;
      margin: 25px 0;
    }

    .details {
      font-size: 26px;
      margin: 12px 0;
      color: #fff;
    }

    .card p {
      color: #fff;
    }
  </style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover" onclick="openInvite()">

  <div class="bismillah">
    اَلسَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ
  </div>

  <h1>Wedding Invitation</h1>

  <div class="invite-line">
    YOU ARE CORDIALLY INVITED
  </div>

  <div class="click-open">
    Click to Open
  </div>

</div>

<!-- INVITATION -->
<div class="invitation" id="invite">
  <div class="card">
    <h2>Wedding Invitation</h2>
    <p>Together with their families</p>

    <div class="names">
      Anas ❤️ Bride Name
    </div>

    <p class="details">Date: 10 July 2026</p>
    <p class="details">Time: 6:00 PM</p>
    <p class="details">Venue: Your Wedding Hall</p>
  </div>
</div>

<script>
  function openInvite() {
    document.getElementById("cover").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("cover").style.display = "none";

      let invite = document.getElementById("invite");
      invite.style.display = "flex";

      setTimeout(() => {
        invite.classList.add("show");
      }, 50);

    }, 800);
  }
</script>

</body>
</html>
