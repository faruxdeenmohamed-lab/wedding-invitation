<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&family=Amiri&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    .bismillah {
      font-family: 'Amiri', serif;
      font-size: clamp(50px, 7vw, 90px);
      direction: rtl;
      margin-bottom: 25px;
      color: #000;
    }

    .cover h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(80px, 12vw, 150px);
      margin: 0;
    }

    .invite-line {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 4vw, 50px);
      margin-top: 25px;
      color: #000;
    }

    .click-open {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 3vw, 40px);
      margin-top: 35px;
      opacity: 0.8;
    }

    /* INVITATION BACKGROUND */
    .invitation {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;

      background: url('images/inside.jpg') no-repeat center center;
      background-size: cover;

      position: relative;

      opacity: 0;
      transform: scale(0.8);
      transition: all 1s ease;
    }

    /* DARK + WATERCOLOR FEEL */
    .invitation::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* SOFT WATERCOLOR LAYER */
    .invitation::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left,
        rgba(255,255,255,0.25),
        transparent 60%);
      mix-blend-mode: overlay;
    }

    .invitation.show {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    /* CONTENT (NO CARD) */
    .content {
      position: relative;
      z-index: 2;
      color: #fff;
      padding: 20px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 75px;
      color: #f5c6d0;
      margin: 0;
      text-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 55px;
      margin: 25px 0;
      text-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .details {
      font-size: 28px;
      margin: 10px 0;
      text-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }

    .content p {
      font-size: 24px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover" onclick="openInvite()">

  <div class="bismillah">
    اَلسَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ
  </div>

  <h1>Wedding Invitation</h1>

  <div class="invite-line">
    YOU ARE CORDIALLY INVITED
  </div>

  <div class="click-open">
    Click to Open
  </div>

</div>

<!-- INVITATION -->
<div class="invitation" id="invite">
  <div class="content">
    <h2>Wedding Invitation</h2>
    <p>Together with their families</p>

    <div class="names">
      Anas ❤️ Bride Name
    </div>

    <p class="details">Date: 10 July 2026</p>
    <p class="details">Time: 6:00 PM</p>
    <p class="details">Venue: Your Wedding Hall</p>
  </div>
</div>

<script>
  function openInvite() {
    document.getElementById("cover").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("cover").style.display = "none";

      let invite = document.getElementById("invite");
      invite.style.display = "flex";

      setTimeout(() => {
        invite.classList.add("show");
      }, 50);

    }, 800);
  }
</script>

</body>
</html>
