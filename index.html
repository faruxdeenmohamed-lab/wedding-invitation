<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&family=Amiri&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;

      padding: 20px;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    .bismillah {
      font-family: 'Amiri', serif;
      font-size: clamp(50px, 7vw, 90px);
      direction: rtl;
      margin-bottom: 25px;
      color: #000;
    }

    .cover h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(80px, 12vw, 150px);
      margin: 0;
    }

    .invite-line {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 4vw, 50px);
      margin-top: 25px;
      color: #000;
    }

    .click-open {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 3vw, 40px);
      margin-top: 35px;
      opacity: 0.8;
    }

    /* INSIDE */
    .invitation {
      display: none;
      height: 100vh;
      width: 100%;

      justify-content: center;
      align-items: center;

      position: relative;
      background: #000;

      opacity: 0;
      transform: scale(0.9);
      transition: all 1s ease;
    }

    .invitation.show {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    /* IMAGE */
    .inside-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 🌙 BISMILLAH INSIDE IMAGE (FIXED POSITION) */
    .bismillah-inside {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);

      width: 90%;
      text-align: center;

      font-family: 'Amiri', serif;
      font-size: clamp(28px, 4vw, 45px);
      color: white;

      z-index: 2;
      text-shadow: 0 5px 15px rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover" onclick="openInvite()">

  <div class="bismillah">
    اَلسَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ
  </div>

  <h1>Wedding Invitation</h1>

  <div class="invite-line">
    YOU ARE CORDIALLY INVITED
  </div>

  <div class="click-open">
    Click to Open
  </div>

</div>

<!-- INSIDE -->
<div class="invitation" id="invite">

  <img src="images/inside.jpg" class="inside-img">

  <div class="bismillah-inside">
    بِسْــــــــــــــــــمِ اﷲِالرَّحْمَنِ اارَّحِيم
  </div>

</div>

<script>
  function openInvite() {
    document.getElementById("cover").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("cover").style.display = "none";

      let invite = document.getElementById("invite");
      invite.style.display = "flex";

      setTimeout(() => {
        invite.classList.add("show");
      }, 50);

    }, 800);
  }
</script>

</body>
</html>
