<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      overflow: hidden;
      background: #f4f4f4; /* simple inside background */
    }

    /* OUTSIDE COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      font-size: 28px;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    /* INSIDE INVITATION */
    .invitation {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: scale(0.8);
      transition: all 1s ease;
    }

    .invitation.show {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    /* CARD */
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .names {
      font-size: 26px;
      margin: 20px 0;
    }

    .details {
      margin: 10px 0;
      font-size: 18px;
    }
  </style>

</head>
<body>

<!-- COVER -->
<div class="cover" id="cover" onclick="openInvite()">
  <div>💌 Wedding Invitation</div>
  <div style="font-size:16px;">Click to Open</div>
</div>

<!-- INVITATION -->
<div class="invitation" id="invite">
  <div class="card">
    <h2>Wedding Invitation 💍</h2>
    <p>Together with their families</p>

    <div class="names">
      Anas ❤️ [Bride Name]
    </div>

    <p class="details">Date: 10 July 2026</p>
    <p class="details">Time: 6:00 PM</p>
    <p class="details">Venue: Your Wedding Hall</p>
  </div>
</div>

<script>
  function openInvite() {
    let cover = document.getElementById("cover");
    let invite = document.getElementById("invite");

    cover.style.opacity = "0";

    setTimeout(() => {
      cover.style.display = "none";
      invite.style.display = "flex";

      setTimeout(() => {
        invite.classList.add("show");
      }, 50);

    }, 1000);
  }
</script>

</body>
</html>
