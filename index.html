<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&family=Amiri&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    .bismillah {
      font-family: 'Amiri', serif;
      font-size: clamp(50px, 7vw, 90px);
      direction: rtl;
      margin-bottom: 25px;
      color: #000;
    }

    .cover h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(80px, 12vw, 150px);
      margin: 0;
    }

    .invite-line {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 4vw, 50px);
      margin-top: 25px;
      color: #000;
    }

    .click-open {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 3vw, 40px);
      margin-top: 35px;
      opacity: 0.8;
    }

    /* INVITATION */
    .invitation {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .card h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
      color: #b76e79;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 45px;
      margin: 25px 0;
    }

    .details {
      font-size: 26px;
      margin: 12px 0;
    }
  </style>
</head>

<body>

<!-- COVER (CLICK ENABLED) -->
<div class="cover" id="cover" onclick="openInvite()">

  <div class="bismillah">
    اَلسَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ
  </div>

  <h1>Wedding Invitation</h1>

  <div class="invite-line">
    YOU ARE CORDIALLY INVITED
  </div>

  <div class="click-open">
    Click to Open
  </div>

</div>

<!-- INVITATION -->
<div class="invitation" id="invite">
  <div class="card">
    <h2>Wedding Invitation</h2>
    <p>Together with their families</p>

    <div class="names">
      Anas ❤️ Bride Name
    </div>

    <p class="details">Date: 10 July 2026</p>
    <p class="details">Time: 6:00 PM</p>
    <p class="details">Venue: Your Wedding Hall</p>
  </div>
</div>

<script>
  function openInvite() {
    document.getElementById("cover").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("cover").style.display = "none";
      document.getElementById("invite").style.display = "flex";
    }, 800);
  }
</script>

</body>
</html>
