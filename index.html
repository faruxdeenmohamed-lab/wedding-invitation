<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&family=Amiri&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    /* ARABIC */
    .bismillah {
      font-family: 'Amiri', serif;
      font-size: clamp(50px, 7vw, 90px);
      direction: rtl;
      margin-bottom: 25px;
      color: #000;
    }

    /* TITLE */
    .cover h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(80px, 12vw, 150px);
      margin: 0;
    }

    /* INVITE TEXT */
    .invite-line {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 4vw, 50px);
      margin-top: 25px;
      color: #000;
    }

    /* INVITATION */
    .invitation {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .card h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
      color: #b76e79;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 45px;
      margin: 25px 0;
    }

    .details {
      font-size: 26px;
      margin: 12px 0;
    }
  </style>
</head>

<body>

<!-- COVER -->
<div class="cover">

  <div class="bismillah">
    اَلسَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ
  </div>

  <h1>Wedding Invitation</h1>

  <div class="invite-line">
    YOU ARE CORDIALLY INVITED
  </div>

</div>

<!-- INVITATION (kept hidden since no click needed) -->
<div class="invitation">
  <div class="card">
    <h2>Wedding Invitation</h2>
    <p>Together with their families</p>

    <div class="names">
      Anas ❤️ Bride Name
    </div>

    <p class="details">Date: 10 July 2026</p>
    <p class="details">Time: 6:00 PM</p>
    <p class="details">Venue: Your Wedding Hall</p>
  </div>
</div>

</body>
</html>
