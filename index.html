<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&family=Amiri&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    /* LOGO SVG (NEW ADDED) */
    .logo-svg {
      width: clamp(120px, 18vw, 220px);
      height: auto;
      margin-bottom: 15px;
      display: block;
    }

    /* COVER */
    .cover {
      height: 100vh;
      background: url('images/cover.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: pointer;
      transition: opacity 1s ease;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    /* LOGO AS (kept as backup style) */
    .logo-text {
      font-family: 'Cinzel', serif;
      font-size: clamp(70px, 10vw, 130px);
      font-weight: 700;
      letter-spacing: 6px;
      color: transparent;
      -webkit-text-stroke: 2px #000;
      text-shadow: 0 0 10px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    .bismillah {
      font-family: 'Amiri', serif;
      font-size: clamp(30px, 5vw, 60px);
      direction: rtl;
      margin-bottom: 15px;
      color: #000;
    }

    .cover h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(50px, 9vw, 110px);
      margin: 0;
    }

    .invite-line {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 2.5vw, 26px);
      margin-top: 15px;
      white-space: nowrap;
      overflow: hidden;
      width: 100%;
      max-width: 90%;
    }

    .invite-line span {
      display: inline-block;
      padding-left: 100%;
      animation: scrollText 8s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .cover p {
      font-family: 'Cinzel', serif;
      margin-top: 20px;
      font-size: 18px;
    }

    /* INVITATION */
    .invitation {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: scale(0.8);
      transition: all 1s ease;
      background: #f4f4f4;
    }

    .invitation.show {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .card h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 36px;
      color: #b76e79;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 30px;
      margin: 20px 0;
    }

    .details {
      font-size: 18px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover" onclick="openInvite()">

  <!-- OPTION 1: IMAGE/SVG LOGO -->
  <!-- <img src="logo.svg" class="logo-svg"> -->

  <!-- OPTION 2: TEXT LOGO (AS) -->
  <div class="logo-text">AS</div>

  <div class="bismillah">
    اَلسَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ
  </div>

  <h1>Wedding Invitation</h1>

  <div class="invite-line">
    <span>YOU ARE CORDIALLY INVITED • YOU ARE CORDIALLY INVITED •</span>
  </div>

  <p>Click to Open</p>
</div>

<!-- INVITATION -->
<div class="invitation" id="invite">
  <div class="card">
    <h2>Wedding Invitation</h2>
    <p>Together with their families</p>

    <div class="names">
      Anas ❤️ Bride Name
    </div>

    <p class="details">Date: 10 July 2026</p>
    <p class="details">Time: 6:00 PM</p>
    <p class="details">Venue: Your Wedding Hall</p>
  </div>
</div>

<script>
  function openInvite() {
    let cover = document.getElementById("cover");
    let invite = document.getElementById("invite");

    cover.style.opacity = "0";

    setTimeout(() => {
      cover.style.display = "none";
      invite.style.display = "flex";

      setTimeout(() => {
        invite.classList.add("show");
      }, 50);

    }, 1000);
  }
</script>

</body>
</html>
